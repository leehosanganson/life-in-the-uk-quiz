name: Build Branch Image (On-Demand)

on:
  pull_request:
    types: [labeled]

jobs:
  build-branch:
    if: contains(github.event.pull_request.labels.*.name, 'build-image')
    name: Build Developer Branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize Branch Name for Docker Tag
        # Replaces slashes with dashes so 'feature/login' becomes 'feature-login'
        run: |
          CLEAN_BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "IMAGE_TAG=$CLEAN_BRANCH" >> $GITHUB_ENV

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-backend:${{ env.IMAGE_TAG }}

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-frontend:${{ env.IMAGE_TAG }}

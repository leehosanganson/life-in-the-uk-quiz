name: Build Branch Image (On-Demand)

on:
  pull_request:
    types: [labeled]

jobs:
  build-branch:
    if: contains(github.event.pull_request.labels.*.name, 'build-image')
    name: Build Developer Branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanitize Branch Name for Docker Tag
        # Replaces slashes with dashes so 'feature/login' becomes 'feature-login'
        run: |
          CLEAN_BRANCH=$(echo "${{ github.head_ref }}" | tr '/' '-')
          echo "IMAGE_TAG=$CLEAN_BRANCH" >> $GITHUB_ENV

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Harbor
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Backend Image
        uses: redhat-actions/buildah-build@v2
        id: build-backend
        with:
          context: ./backend
          image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-backend
          tags: ${{ env.SHORT_SHA }}
          containerfiles: ./backend/Dockerfile

      - name: Push Backend Image to Harbor
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-backend
          tags: ${{ steps.build-backend.outputs.tags }}
          registry: ${{ vars.HARBOR_REGISTRY }}

      - name: Build & Push Frontend
        uses: redhat-actions/buildah-build@v2
        id: build-frontend
        with:
          context: ./frontend
          image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-frontend
          tags: ${{ env.SHORT_SHA }}
          containerfiles: ./frontend/Dockerfile

      - name: Push Frontend Image to Harbor
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-frontend
          tags: ${{ steps.build-frontend.outputs.tags }}
          registry: ${{ vars.HARBOR_REGISTRY }}

      - name: Print Image URLs
        run: |
          echo "Backend: ${{ steps.build-backend.outputs.registry-paths }}"
          echo "Frontend: ${{ steps.build-frontend.outputs.registry-paths }}"

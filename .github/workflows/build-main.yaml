name: Build and Publish

on:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend
        run: pnpm test --run

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Run tests
        working-directory: backend
        run: go test ./...

      - name: Run vet
        working-directory: backend
        run: go vet ./...

  build-and-push-backend:
    name: Build and Push Backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Harbor
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build Backend
        uses: redhat-actions/buildah-build@v2
        id: build-backend
        with:
          context: ./backend
          image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-backend
          tags: ${{ env.SHORT_SHA }}
          containerfiles: ./backend/Dockerfile

      - name: Push Backend Image to Harbor
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-backend.outputs.image }}
          tags: ${{ steps.build-backend.outputs.tags }}
          registry: ${{ vars.HARBOR_REGISTRY }}

  build-and-push-frontend:
    name: Build and Push Frontend
    runs-on: ubuntu-latest
    needs: [test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Harbor
        uses: redhat-actions/podman-login@v1
        with:
          registry: ${{ vars.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & Push Frontend
        uses: redhat-actions/buildah-build@v2
        id: build-frontend
        with:
          context: ./frontend
          image: ${{ vars.HARBOR_REGISTRY }}/${{ vars.HARBOR_PROJECT }}/life-in-the-uk-quiz-frontend
          tags: ${{ env.SHORT_SHA }}
          containerfiles: ./frontend/Dockerfile

      - name: Push Frontend Image to Harbor
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-frontend.outputs.image }}
          tags: ${{ steps.build-frontend.outputs.tags }}
          registry: ${{ vars.HARBOR_REGISTRY }}
